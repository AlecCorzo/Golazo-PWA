<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#00c853">
  <title>CanCha — Perfil</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body class="app-shell">
<div id="toast-container"></div>

<div class="page-content fade-in">

  <!-- Header perfil -->
  <div class="perfil-header">
    <div class="perfil-avatar" id="perfil-avatar">--</div>
    <div class="perfil-nombre" id="perfil-nombre">Cargando...</div>
    <div id="perfil-verificado" class="hidden perfil-verificado">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 10l4 4 8-8"/></svg>
      Identidad verificada
    </div>
    <p class="text-hint" id="perfil-correo"></p>
  </div>

  <!-- Stats -->
  <div class="perfil-stats mt-4 mb-4" style="margin-top:1rem; margin-bottom:1rem;">
    <div class="stat-item">
      <div class="stat-value" id="stat-partidos">0</div>
      <div class="stat-label">Partidos</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-canchas">0</div>
      <div class="stat-label">Canchas</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-equipo">0</div>
      <div class="stat-label">Equipo</div>
    </div>
  </div>

  <!-- Acciones -->
  <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:1.5rem;">

    <div class="card" style="display:flex; align-items:center; justify-content:space-between; padding:14px 16px;">
      <div style="display:flex; align-items:center; gap:12px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--texto-sub)" stroke-width="1.8"><rect x="2" y="5" width="20" height="15" rx="2"/><path d="M8 10h5M8 14h8"/></svg>
        <span style="font-size:0.95rem;">Documento de identidad</span>
      </div>
      <span class="badge" id="badge-doc">Sin foto</span>
    </div>

    <div class="card" style="display:flex; align-items:center; justify-content:space-between; padding:14px 16px; cursor:pointer;" id="btn-notif">
      <div style="display:flex; align-items:center; gap:12px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--texto-sub)" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span style="font-size:0.95rem;">Notificaciones</span>
      </div>
      <span class="badge badge-gris" id="badge-notif">Sin permiso</span>
    </div>

    <div class="card" style="display:flex; align-items:center; justify-content:space-between; padding:14px 16px;">
      <div style="display:flex; align-items:center; gap:12px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--texto-sub)" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span style="font-size:0.95rem;">Soporte</span>
      </div>
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="var(--texto-hint)" stroke-width="2"><path d="M7 10h6M13 7l3 3-3 3"/></svg>
    </div>

  </div>

  <!-- Cerrar sesión -->
  <button class="btn btn-danger" id="btn-logout">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h4M14 7l4 3-4 3M18 10H8"/></svg>
    Cerrar sesión
  </button>

  <p class="text-hint text-center mt-3" style="margin-top:1rem;">CanCha v1.0 · Hecho con ❤️ en Colombia</p>

</div>

<!-- Navbar -->
<nav class="navbar">
  <a href="/pages/home.html" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Inicio
  </a>
  <a href="/pages/canchas.html" class="nav-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M5 12h14M12 5v14"/></svg>
    Canchas
  </a>
  <a href="/pages/equipo.html" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Equipo
  </a>
  <a href="/pages/perfil.html" class="nav-item active">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Perfil
  </a>
</nav>

<script type="module">
  import { requiereAuth, logout } from '/js/auth.js';
  import { usuarioStorage, reservasDB, initDB } from '/js/db.js';
  import { iniciales, mostrarToast } from '/js/app.js';
  import { pedirPermisoNotificaciones } from '/js/notificaciones.js';

  await initDB();
  if (!requiereAuth()) throw new Error('No autenticado');

  const usuario = usuarioStorage.obtener();

  // ─── Cargar datos del perfil ──────────────────────────
  document.getElementById('perfil-avatar').textContent = iniciales(usuario.nombre);
  document.getElementById('perfil-nombre').textContent = usuario.nombre;
  document.getElementById('perfil-correo').textContent = usuario.correo;

  if (usuario.verificado) {
    document.getElementById('perfil-verificado').classList.remove('hidden');
    document.getElementById('badge-doc').textContent = 'Verificado';
    document.getElementById('badge-doc').className = 'badge badge-verde';
  } else {
    document.getElementById('badge-doc').textContent = 'Pendiente';
    document.getElementById('badge-doc').className = 'badge badge-amarillo';
  }

  if (Notification.permission === 'granted') {
    document.getElementById('badge-notif').textContent = 'Activadas';
    document.getElementById('badge-notif').className = 'badge badge-verde';
  }

  // ─── Stats ────────────────────────────────────────────
  const reservas = await reservasDB.obtenerPorUsuario(usuario.id);
  document.getElementById('stat-partidos').textContent = reservas.length;
  document.getElementById('stat-canchas').textContent  = new Set(reservas.map(r => r.canchaId)).size;

  // ─── Notificaciones ───────────────────────────────────
  document.getElementById('btn-notif').addEventListener('click', async () => {
    const ok = await pedirPermisoNotificaciones();
    if (ok) {
      document.getElementById('badge-notif').textContent = 'Activadas';
      document.getElementById('badge-notif').className = 'badge badge-verde';
      mostrarToast('Notificaciones activadas ✓', 'success');
    } else {
      mostrarToast('Habilitá las notificaciones en la configuración del navegador.', 'info');
    }
  });

  // ─── Logout ───────────────────────────────────────────
  document.getElementById('btn-logout').addEventListener('click', () => {
    if (confirm('¿Seguro que querés cerrar sesión?')) logout();
  });
</script>
</body>
</html>
