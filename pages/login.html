<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#3ae07a">
  <title>Golazo — Ingresar</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div id="toast-container"></div>

<div class="page-content" style="display:flex; flex-direction:column; justify-content:center; min-height:100vh; padding-top:2rem;">

  <!-- Logo -->
  <div class="text-center mb-4" style="margin-bottom:2.5rem; animation: popIn 0.52s cubic-bezier(.34,1.56,.64,1) both;">
    <div style="display:inline-flex; align-items:center; justify-content:center;
      width:72px; height:72px; border-radius:20px; background:var(--verde);
      box-shadow:0 14px 36px -8px rgba(58,224,122,0.55); margin-bottom:14px;">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
        <circle cx="19" cy="19" r="16" stroke="#041a09" stroke-width="2"/>
        <circle cx="19" cy="19" r="5.5" stroke="#041a09" stroke-width="2"/>
        <line x1="3" y1="19" x2="35" y2="19" stroke="#041a09" stroke-width="1.8"/>
        <line x1="19" y1="3" x2="19" y2="35" stroke="#041a09" stroke-width="1.5"/>
      </svg>
    </div>
    <div style="font-family:var(--font-display); font-size:2.8rem; font-weight:900;
      color:var(--verde); letter-spacing:0.02em; text-transform:uppercase; line-height:1;">GOLAZO</div>
    <p style="color:var(--texto-hint); margin-top:6px; font-size:0.82rem; font-weight:600; letter-spacing:0.04em;">
      Reserva · Juega · Compite
    </p>
  </div>

  <!-- Tabs login / registro -->
  <div style="display:flex; gap:4px; background:var(--fondo-card); border:1.5px solid var(--borde); border-radius:var(--radio-sm); padding:4px; margin-bottom:1.5rem;">
    <button class="tab-btn active" data-tab="login"
      style="flex:1; padding:10px 8px; border-radius:10px; font-family:var(--font-display); font-size:13px; font-weight:900; text-transform:uppercase; letter-spacing:0.01em; transition:all 0.22s; background:var(--verde); color:#041a09; box-shadow:0 4px 12px -3px rgba(58,224,122,0.5); border:none; cursor:pointer;">
      Ingresar
    </button>
    <button class="tab-btn" data-tab="registro"
      style="flex:1; padding:10px 8px; border-radius:10px; font-family:var(--font-display); font-size:13px; font-weight:900; text-transform:uppercase; letter-spacing:0.01em; transition:all 0.22s; background:transparent; color:var(--texto-sub); border:none; cursor:pointer;">
      Registrarse
    </button>
  </div>

  <!-- Formulario Login -->
  <form id="form-login" class="flex flex-col gap-4">
    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input type="email" id="login-correo" class="form-input" placeholder="tu@correo.com" autocomplete="email" required>
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn-primary mt-2" id="btn-login">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h14M10 3l7 7-7 7"/></svg>
      Ingresar
    </button>
  </form>

  <!-- Formulario Registro -->
  <form id="form-registro" class="flex flex-col gap-4 hidden">
    <div class="form-group">
      <label class="form-label">Nombre completo</label>
      <input type="text" id="reg-nombre" class="form-input" placeholder="Tu nombre" autocomplete="name" required>
    </div>
    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input type="email" id="reg-correo" class="form-input" placeholder="tu@correo.com" autocomplete="email" required>
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" id="reg-password" class="form-input" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>
    </div>

    <button type="submit" class="btn btn-primary mt-2" id="btn-registrar">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 4v12M4 10h12"/></svg>
      Crear cuenta
    </button>
  </form>

</div>

<script type="module">
  import { login, registrar } from '/js/auth.js';
  import { mostrarToast, mostrarLoading, ocultarLoading } from '/js/app.js';
  import { initDB } from '/js/db.js';

  await initDB();

  // ─── Tabs ───────────────────────────────────────────
  const tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => {
        t.style.background = 'transparent';
        t.style.color = 'var(--texto-sub)';
      });
      tab.style.background = 'var(--verde)';
      tab.style.color = '#041a09';

      document.getElementById('form-login').classList.toggle('hidden', tab.dataset.tab !== 'login');
      document.getElementById('form-registro').classList.toggle('hidden', tab.dataset.tab !== 'registro');
    });
  });

  // ─── Login ──────────────────────────────────────────
  document.getElementById('form-login').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.textContent = 'Ingresando...';
    try {
      await login({
        correo:   document.getElementById('login-correo').value,
        password: document.getElementById('login-password').value
      });
      window.location.href = '/pages/home.html';
    } catch (err) {
      mostrarToast(err.message, 'error');
      btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h14M10 3l7 7-7 7"/></svg> Ingresar';
    }
  });

  // ─── Registro ────────────────────────────────────────
  document.getElementById('form-registro').addEventListener('submit', async (e) => {
    e.preventDefault();
    mostrarLoading('Creando tu cuenta...');
    try {
      await registrar({
        nombre:   document.getElementById('reg-nombre').value,
        correo:   document.getElementById('reg-correo').value,
        password: document.getElementById('reg-password').value
      });
      window.location.href = '/pages/home.html';
    } catch (err) {
      mostrarToast(err.message, 'error');
    } finally {
      ocultarLoading();
    }
  });
</script>
</body>
</html>
