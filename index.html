<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#3ae07a">
  <meta name="description" content="Reserva canchas sintéticas, organiza tu equipo y juega sin caos.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Golazo">
  <title>Golazo</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>

  <!-- Splash screen -->
  <div class="splash" id="splash">
    <div class="splash-icon">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
        <circle cx="19" cy="19" r="16" stroke="#041a09" stroke-width="2"/>
        <circle cx="19" cy="19" r="5.5" stroke="#041a09" stroke-width="2"/>
        <line x1="3" y1="19" x2="35" y2="19" stroke="#041a09" stroke-width="1.8"/>
        <line x1="19" y1="3" x2="19" y2="35" stroke="#041a09" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="splash-logo">GOLAZO</div>
    <div class="spinner"></div>
    <p class="splash-sub">Reserva · Juega · Compite</p>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { initApp } from '/js/app.js';
    import { usuarioStorage } from '/js/db.js';

    async function arrancar() {
      await initApp();

      setTimeout(() => {
        const splash = document.getElementById('splash');
        splash.style.opacity = '0';
        splash.style.transition = 'opacity 0.4s';

        setTimeout(() => {
          splash.remove();
          // Redirigir según sesión
          if (usuarioStorage.estaLogueado()) {
            window.location.href = '/pages/home.html';
          } else {
            window.location.href = '/pages/login.html';
          }
        }, 400);
      }, 1400);
    }

    arrancar();
  </script>
</body>
</html>
